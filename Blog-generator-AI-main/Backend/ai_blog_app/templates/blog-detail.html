<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Details</title>
        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
</head>
<body class=" bg-gray-100 font-sans antialiased">
    
  <!-- Navbar -->
  <nav class="bg-blue-600 p-4 text-white flex justify-between">
    <div>
      <h1 class="text-3xl font-bold">AI Blog Generator</h1>
    </div>
    <div>
        <a href="#" class="bg-blue-600 text-white px-4 py-2 rounded-full font-extrabold text-lg transform hover:scale-110 
        hover:bg-white hover:text-blue-600 transition duration-300 ease-in-out shadow-md">Logout</a>
    </div>
  </nav>

  <!-- main content  -->
   <div class="container mx-auto mt-10 px-4 sm:px-0">
    <div>
        <section>
            <h2 class="text-xl mb-4 font-semibold"> Blog Post Details</h2>
            <div class="border border-gray-300 p-4 rounded-lg bg-white shadow-md">
                <h3 class="text-lg font-semibold"> Blog Post Title</h3>
                <p class="text-gray-700"> This is the content of the blog post.</p>
                <hr class="my-4 border-gray-300" />
                <h4 class="text-md font-semibold"> YouTube Title</h4>
                <p class="text-gray-700">Title of the associated YouTube video</p>
                <h4 class="text-lg font-semibold">YouTube Link</h4>
                <a href="https://www.youtube.com/watch?v=example" class="text-blue-600 hover:underline">https://www.youtube.com/watch?v=example</a>
            </div>
        </section>
    </div>
   </div>
  <!-- Footer -->
  <footer class="text-center py-4 text-black mt-6">
    Powered by <a href="#" class="underline text-blue-600">Code With Me</a>
  </footer>
</body>
</html>
