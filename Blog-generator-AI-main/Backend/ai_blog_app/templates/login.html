<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 font-sans antialised">
    <!-- Navbav -->
     <nav class="bg-blue-600 p-4 text-white flex justify-between">
        <div>
            <h1 class="text-3xl font-bold">AI Blog Generator</h1>
        </div>
        <div>
            <a href="#" class="text-white hover:underline" >Login </a>
            <a href="#" class="text-white hover:underline" >Signup </a>
        </div>
    </nav>

    <!-- main content -->
     <div class="flex item-center justify-center h-screen">
        <div class="bg-white p-8 shadow-md-lg max-w-md w-full">

            <!-- login -->
             <form class="space-y-4">
                <h2 class="text-xl font-semibold">login</h2>
                <div>
                    <label for="username" class="block mb-1 font-medium">username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username..." class="w-full p-2 border rounded-md" />
                </div>
                <div>
                    <label for="password" class="block mb-1 font-medium">password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password..." class="w-full p-2 border rounded-md" />
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700"> Login</button>

             </form>
     </div>
  <!-- Footer -->
  <footer class="text-center py-4 text-black mt-6">
    Powered by <a href="#" class="underline text-blue-600">Code With Me</a>
  </footer>
</body>
</html>
